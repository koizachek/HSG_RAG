name: Smoke Tests

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  offline-smoke:
    name: Offline pytest smoke
    runs-on: ubuntu-latest
    env:
      SMOKE_TEST_PATHS: tests/test_main_entrypoint.py tests/test_stream_parser.py

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Assert pytest collects tests
        run: |
          set -euo pipefail
          python - <<'PY'
          import pytest


          class CollectionCounter:
              count = 0

              def pytest_collection_modifyitems(self, session, config, items):
                  self.count = len(items)


          import os


          counter = CollectionCounter()
          paths = os.environ["SMOKE_TEST_PATHS"].split()
          exit_code = pytest.main([*paths, "--collect-only", "-q"], plugins=[counter])
          if int(exit_code) != 0:
              raise SystemExit(int(exit_code))
          if counter.count <= 0:
              raise SystemExit("Expected pytest to collect more than 0 tests.")
          print(f"Collected {counter.count} tests.")
          PY

      - name: Run offline smoke tests
        run: |
          set -euo pipefail
          pytest -q $SMOKE_TEST_PATHS

  llm-eval:
    name: LLM eval gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    env:
      RUN_LLM_EVAL: "1"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY || secrets.OPEN_ROUTER_API_KEY }}
      WEAVIATE_API_KEY: ${{ secrets.WEAVIATE_API_KEY }}
      WEAVIATE_CLUSTER_URL: ${{ secrets.WEAVIATE_CLUSTER_URL }}
      LANGSMITH_TRACING: "true"
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
      LANGSMITH_ENDPOINT: https://api.smith.langchain.com
      WEAVIATE_KEEP_WARM_ENABLED: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Validate LLM eval secrets
        run: |
          set -euo pipefail
          python - <<'PY'
          import os

          required = [
              "OPENAI_API_KEY",
              "WEAVIATE_API_KEY",
              "WEAVIATE_CLUSTER_URL",
          ]
          missing = [name for name in required if not os.getenv(name)]
          if missing:
              raise SystemExit(
                  "Missing secrets required for PR LLM eval gate: "
                  + ", ".join(missing)
              )
          PY

      - name: Assert LLM eval collects cases
        run: |
          set -euo pipefail
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          eval_path = Path("tests/test_llm_fact_eval.py")
          spec = importlib.util.spec_from_file_location("llm_fact_eval", eval_path)
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)

          case_count = len(module.CASES)
          if case_count <= 0:
              raise SystemExit("Expected LLM eval to collect more than 0 cases.")
          print(f"Collected {case_count} LLM eval cases.")
          PY

      - name: Run LLM eval
        run: |
          set -euo pipefail
          pytest tests/test_llm_fact_eval.py -q
