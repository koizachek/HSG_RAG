name: Update Programme Facts

on:
  workflow_dispatch:
  schedule:
    - cron: "23 6 * * *" # Daily at 06:23 UTC

permissions:
  contents: write

jobs:
  update-programme-facts:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY}}
      WEAVIATE_API_KEY: ${{ secrets.WEAVIATE_API_KEY }}
      WEAVIATE_CLUSTER_URL: ${{ secrets.WEAVIATE_CLUSTER_URL }}
      HUGGING_FACE_API_KEY: ${{ secrets.HUGGING_FACE_API_KEY }}
      LANGSMITH_TRACING: "true"
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
      LANGSMITH_ENDPOINT: https://api.smith.langchain.com
      NOTIFY_ENABLE_EMAIL_ALERTS: ${{ vars.NOTIFY_ENABLE_EMAIL_ALERTS || 'true' }}
      NOTIFY_SMTP_HOST: ${{ secrets.NOTIFY_SMTP_HOST }}
      NOTIFY_SMTP_PORT: ${{ vars.NOTIFY_SMTP_PORT || '587' }}
      NOTIFY_SMTP_USE_TLS: ${{ vars.NOTIFY_SMTP_USE_TLS || 'true' }}
      NOTIFY_SMTP_USER: ${{ secrets.NOTIFY_SMTP_USER }}
      NOTIFY_SMTP_PASSWORD: ${{ secrets.NOTIFY_SMTP_PASSWORD }}
      NOTIFY_FROM_EMAIL: ${{ secrets.NOTIFY_FROM_EMAIL }}
      NOTIFY_TO_EMAIL: ${{ secrets.NOTIFY_TO_EMAIL }}
      NOTIFY_ENABLE_SLACK_ALERTS: ${{ vars.NOTIFY_ENABLE_SLACK_ALERTS || 'true' }}
      NOTIFY_SLACK_WEBHOOK_URL: ${{ secrets.NOTIFY_SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate LLM secret
        run: |
          if [ -z "$OPEN_ROUTER_API_KEY" ]; then
            echo "::error::OPEN_ROUTER_API_KEY is not available to this workflow. Configure secrets.OPEN_ROUTER_API_KEY or secrets.OPENROUTER_API_KEY."
            exit 1
          fi

      - name: Update programme facts
        run: |
          python -m src.pipeline.update_programme_facts

      - name: Commit changes
        if: github.ref_type == 'branch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f data/database/programme_facts.json

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "chore: update programme facts"
          git push origin HEAD:${{ github.ref_name }}
